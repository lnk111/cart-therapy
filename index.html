    <script type="text/javascript">
      // GitHub Pages SPA fallback (https://github.com/rafrex/spa-github-pages).
      // Decodes the path that 404.html stashed in the query string and
      // restores it via history.replaceState before React Router boots.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          )
        }
      })(window.location)
