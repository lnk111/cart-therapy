<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Cart Therapy</title>
    <script type="text/javascript">
      // GitHub Pages SPA fallback (https://github.com/rafrex/spa-github-pages).
      // GH Pages has no server-side rewrite, so deep links land on 404.html.
      // We encode the requested path into a query string and redirect to the
      // app root; index.html then decodes it back into the real path.
      // pathSegmentsToKeep = 1 because the app lives under "/cart-therapy/".
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
